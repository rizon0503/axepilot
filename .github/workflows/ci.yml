name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Create secrets.h from template
        run: cp include/secrets.h.example include/secrets.h

      - name: Native unit tests
        run: pio test -e native

      # Static analysis (#78): medium+ findings in our code fail the build;
      # low/style stays advisory in the log. Scope and suppressions live in
      # platformio.ini next to the env they apply to.
      - name: Static analysis (cppcheck)
        run: pio check -e esp32-cyd --skip-packages --fail-on-defect=medium --fail-on-defect=high

      - name: Build ESP32 firmware
        run: pio run -e esp32-cyd

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/esp32-cyd/firmware.bin

  publish-release:
    needs: build-and-test
    # An explicit `if:` replaces the default implicit success() check on a
    # job with `needs:` — without success() here, a failed build-and-test
    # wouldn't cleanly skip this job, it'd run anyway and fail on a missing
    # artifact instead.
    if: success() && github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: .

      # Compiled with the placeholder secrets.h.example, same as the build
      # above — not flashable as-is, see #56 for why real secrets are never
      # injected into a release built from this public repo.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # run_number increments on every ci.yml trigger (PR builds too,
          # not just master pushes), so consecutive release versions can
          # skip numbers — still monotonically increasing and unique,
          # just not gapless. Date prefix keeps it human-sortable at a
          # glance without needing to cross-reference the commit history.
          VERSION="v$(date -u +%Y.%m.%d).${{ github.run_number }}"
          # Idempotent: a manual "re-run failed jobs" reuses the same
          # run_number, which would otherwise fail with "release already
          # exists" — the rebuild is deterministic from the same commit
          # anyway, so replacing it is harmless.
          gh release delete "$VERSION" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "$VERSION" firmware.bin \
            --repo "${{ github.repository }}" \
            --title "$VERSION" \
            --notes "Automated build from commit $GITHUB_SHA. Compiled with placeholder secrets (secrets.h.example) — not flashable as-is; copy include/secrets.h.example to include/secrets.h with your own credentials and rebuild locally. Intended as a rollback reference point, not a ready-to-flash release."
