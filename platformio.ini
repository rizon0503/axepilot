[platformio]
default_envs = esp32-cyd

[env:esp32-cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D LOAD_FONT4=1
    ; esp32-hal-log level: 0=None 1=Error 2=Warn 3=Info 4=Debug 5=Verbose
    -D CORE_DEBUG_LEVEL=3
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4
    paulstoffregen/XPT2046_Touchscreen

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
; Link the pure business logic (src/core) into native tests; main.cpp and
; src/hal depend on ESP32 hardware and must stay out of the host build.
test_build_src = yes
build_src_filter = +<core/>
lib_deps =
    bblanchon/ArduinoJson@^7.0.4
